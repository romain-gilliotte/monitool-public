<div class="auth-container">
    <div class="panel panel-default">
        <div class="panel-heading">
            <h3 class="panel-title">
                <i class="fa fa-user-plus"></i>
                Create Your Account
            </h3>
        </div>
        <div class="panel-body">
            <div ng-if="$ctrl.success" class="alert alert-success" data-testid="registration-success">
                <i class="fa fa-check-circle"></i>
                <strong>{{$ctrl.successMessage || 'Registration successful!'}}</strong>
                <div style="margin-top: 15px;">
                    <a ng-click="$ctrl.goToLogin()" class="btn btn-success" data-testid="goto-login-success">
                        <i class="fa fa-sign-in"></i>
                        Go to Sign In
                    </a>
                </div>
            </div>

            <div ng-if="!$ctrl.success">
                <div ng-if="$ctrl.error" class="alert alert-danger" data-testid="registration-error">
                    <i class="fa fa-exclamation-triangle"></i>
                    {{$ctrl.error}}
                </div>

                <form ng-submit="$ctrl.register($event)" novalidate data-testid="registration-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input 
                            type="text" 
                            id="name" 
                            class="form-control" 
                            ng-model="$ctrl.form.name"
                            placeholder="Enter your full name"
                            required
                            ng-disabled="$ctrl.loading"
                            data-testid="name-input">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            class="form-control" 
                            ng-model="$ctrl.form.email"
                            placeholder="Enter your email"
                            required
                            ng-disabled="$ctrl.loading"
                            data-testid="email-input">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            class="form-control" 
                            ng-model="$ctrl.form.password"
                            placeholder="Choose a strong password"
                            required
                            ng-disabled="$ctrl.loading"
                            data-testid="password-input">
                        
                        <div ng-if="$ctrl.form.password && $ctrl.getPasswordStrength()" class="password-strength">
                            <div class="strength-bar">
                                <div class="strength-fill" ng-class="'strength-' + $ctrl.getPasswordStrength().level"></div>
                            </div>
                            <span class="strength-text" ng-class="'text-' + $ctrl.getPasswordStrength().level">
                                {{$ctrl.getPasswordStrength().text}}
                            </span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            class="form-control" 
                            ng-model="$ctrl.form.confirmPassword"
                            placeholder="Confirm your password"
                            required
                            ng-disabled="$ctrl.loading"
                            data-testid="confirm-password-input">
                    </div>

                    <div class="form-group">
                        <button 
                            type="submit" 
                            class="btn btn-primary btn-block"
                            ng-disabled="$ctrl.loading"
                            data-testid="register-submit">
                            <i ng-class="$ctrl.loading ? 'fa fa-spinner fa-spin' : 'fa fa-user-plus'"></i>
                            {{$ctrl.loading ? 'Creating Account...' : 'Create Account'}}
                        </button>
                    </div>
                </form>

                <div class="auth-divider">
                    <span>or</span>
                </div>

                <div class="oauth-buttons">
                    <button 
                        type="button" 
                        class="btn btn-google btn-block"
                        ng-click="$ctrl.loginWithGoogle()"
                        ng-disabled="$ctrl.loading">
                        <i class="fa fa-google"></i>
                        Continue with Google
                    </button>

                    <button 
                        type="button" 
                        class="btn btn-microsoft btn-block"
                        ng-click="$ctrl.loginWithMicrosoft()"
                        ng-disabled="$ctrl.loading">
                        <i class="fa fa-windows"></i>
                        Continue with Microsoft
                    </button>
                </div>

                <div class="auth-links">
                    <p>
                        Already have an account? 
                        <a ng-click="$ctrl.goToLogin()" data-testid="goto-login-link">
                            Sign in here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

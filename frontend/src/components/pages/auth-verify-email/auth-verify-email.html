<div class="auth-container">
    <div class="panel panel-default">
        <div class="panel-heading">
            <h3 class="panel-title">
                <i class="fa fa-envelope-o"></i>
                Email Verification
            </h3>
        </div>
        <div class="panel-body text-center">
            <div ng-if="$ctrl.loading">
                <i class="fa fa-spinner fa-spin fa-3x text-primary"></i>
                <h4 style="margin-top: 20px;">Verifying your email...</h4>
                <p class="text-muted">Please wait while we verify your email address.</p>
            </div>

            <div ng-if="$ctrl.success">
                <i class="fa fa-check-circle fa-3x text-success"></i>
                <h4 style="margin-top: 20px; color: #5cb85c;">Email Verified Successfully!</h4>
                <p>Your email address has been verified. You can now sign in to your account.</p>
                <div style="margin-top: 20px;">
                    <a ng-click="$ctrl.goToLogin()" class="btn btn-success">
                        <i class="fa fa-sign-in"></i>
                        Sign In Now
                    </a>
                </div>
            </div>

            <div ng-if="$ctrl.error">
                <i class="fa fa-exclamation-triangle fa-3x text-danger"></i>
                <h4 style="margin-top: 20px; color: #d9534f;">Verification Failed</h4>
                <p>{{$ctrl.error}}</p>
                <div style="margin-top: 20px;">
                    <a ng-click="$ctrl.goToLogin()" class="btn btn-primary">
                        <i class="fa fa-sign-in"></i>
                        Go to Sign In
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

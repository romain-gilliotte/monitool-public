<div class="auth-container">
  <div class="panel panel-default">
    <div class="panel-heading">
      <h3 class="panel-title">
        <i class="fa fa-key"></i>
        Reset Password
      </h3>
    </div>
    <div class="panel-body">
      <div ng-if="$ctrl.success">
        <div class="alert alert-success">
          <i class="fa fa-check-circle"></i>
          <strong>Reset email sent!</strong>
          If an account with that email exists, you'll receive a password reset link shortly.
        </div>

        <a ng-click="$ctrl.goToLogin()" class="btn btn-success btn-block">
          <i class="fa fa-sign-in"></i>
          Back to Sign In
        </a>
      </div>

      <div ng-if="!$ctrl.success">
        <p class="text-muted" style="margin-bottom: 20px">
          Enter your email address and we'll send you a link to reset your password.
        </p>

        <div ng-if="$ctrl.error" class="alert alert-danger">
          <i class="fa fa-exclamation-triangle"></i>
          {{$ctrl.error}}
        </div>

        <form ng-submit="$ctrl.requestReset()" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              class="form-control"
              ng-model="$ctrl.form.email"
              placeholder="Enter your email address"
              required
              ng-disabled="$ctrl.loading"
              autofocus
              data-testid="email-input"
            />
          </div>

          <div class="form-group">
            <button type="submit" class="btn btn-primary btn-block" ng-disabled="$ctrl.loading">
              <i ng-class="$ctrl.loading ? 'fa fa-spinner fa-spin' : 'fa fa-paper-plane'"></i>
              {{$ctrl.loading ? 'Sending...' : 'Send Reset Link'}}
            </button>
          </div>
        </form>

        <div class="auth-links">
          <p>
            <a ng-click="$ctrl.goToLogin()" href="#">
              <i class="fa fa-arrow-left"></i>
              Back to Sign In
            </a>
          </p>
          <p>
            Don't have an account?
            <a ng-click="$ctrl.goToRegister()" href="#"> Sign up here </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
